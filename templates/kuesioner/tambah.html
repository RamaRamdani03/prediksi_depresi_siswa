{% extends "layout.html" %}

{% block content %}

<h3 class="mb-4" style="font-family:'Poppins',sans-serif; font-weight:600;">
    Input Kuesioner
</h3>

<div class="card shadow">
    <div class="card-body">

        <form method="POST">

            <!-- PILIH SISWA -->
            <div class="mb-3">
                <label class="form-label">Pilih Siswa</label>

                <select name="id_siswa" class="form-select" required>
                    <option value="">-- Pilih Siswa --</option>

                    {% for s in siswa %}
                    <option value="{{ s[0] }}" {% if id_siswa_param and id_siswa_param|int==s[0] %} selected {% endif
                        %}>
                        {{ s[1] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <hr>

            <!-- 1 -->
            <p class="fw-semibold">1. Tekanan Akademik</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="academic_pressure" value="1" required>
                <label class="form-check-label">Rendah</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="academic_pressure" value="2">
                <label class="form-check-label">Sedang</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="academic_pressure" value="3">
                <label class="form-check-label">Tinggi</label>
            </div>

            <!-- 2 -->
            <p class="fw-semibold">2. Gangguan Tidur</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="sleep_duration" value="1" required>
                <label class="form-check-label">Baik</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="sleep_duration" value="2">
                <label class="form-check-label">Cukup</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="sleep_duration" value="3">
                <label class="form-check-label">Buruk</label>
            </div>

            <!-- 3 -->
            <p class="fw-semibold">3. Stres Finansial</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="financial_stress" value="1" required>
                <label class="form-check-label">Rendah</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="financial_stress" value="2">
                <label class="form-check-label">Sedang</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="financial_stress" value="3">
                <label class="form-check-label">Tinggi</label>
            </div>

            <!-- 4 -->
            <p class="fw-semibold">4. Riwayat Depresi (Family History)</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="family_history" value="0" required>
                <label class="form-check-label">Tidak</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="family_history" value="1">
                <label class="form-check-label">Ya</label>
            </div>

            <!-- 5 -->
            <p class="fw-semibold">5. Pikiran Menyakiti Diri</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="suicidal_thoughts" value="0" required>
                <label class="form-check-label">Tidak</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="suicidal_thoughts" value="1">
                <label class="form-check-label">Pernah</label>
            </div>

            <!-- 6 -->
            <p class="fw-semibold">6. Kebiasaan Makan</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="dietary_habits" value="1" required>
                <label class="form-check-label">Sehat</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="dietary_habits" value="2">
                <label class="form-check-label">Cukup</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="dietary_habits" value="3">
                <label class="form-check-label">Tidak Sehat</label>
            </div>

            <!-- 7 -->
            <p class="fw-semibold">7. Kepuasan Belajar</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="study_satisfaction" value="1" required>
                <label class="form-check-label">Rendah</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="study_satisfaction" value="2">
                <label class="form-check-label">Sedang</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="study_satisfaction" value="3">
                <label class="form-check-label">Tinggi</label>
            </div>

            <!-- 8 -->
            <p class="fw-semibold">8. Jam Belajar</p>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="work_study_hours" value="1" required>
                <label class="form-check-label">Sedikit (&lt; 3 jam)</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="work_study_hours" value="2">
                <label class="form-check-label">Sedang (3 - 6 jam)</label>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="radio" name="work_study_hours" value="3">
                <label class="form-check-label">Banyak (&gt; 6 jam)</label>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn btn-success">
                Simpan Kuesioner
            </button>

            <a href="/kuesioner" class="btn btn-secondary">
                Kembali
            </a>

        </form>

    </div>
</div>

{% endblock %}
