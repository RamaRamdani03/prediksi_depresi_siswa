<!DOCTYPE html>
<html>

<head>

    <title>Sistem Prediksi Depresi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial;
        }

        /* SIDEBAR */

        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        /* Judul sidebar */

        .sidebar-title {
            color: burlywood;
            font-weight: bold;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* Menu */

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #495057;
            padding-left: 18px;
        }

        /* Mini sidebar */

        .sidebar.collapsed a span {
            display: none;
        }

        .sidebar.collapsed .sidebar-title {
            display: none;
        }

        /* Content */

        .content {
            flex: 1;
            padding: 20px;
        }

        /* Toggle button */

        .toggle-btn {
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">

        <div class="sidebar-title">
            <a href="/" style="color:burlywood;text-decoration:none;">
                Prediksi Depresi
            </a>
        </div>

        <a href="/">
            🏠 <span>Dashboard</span>
        </a>

        <a href="/siswa">
            👥 <span>Data Siswa</span>
        </a>

        <a href="/kuesioner">
            📝 <span>Kuesioner</span>
        </a>

        <a href="/prediksi">
            📊 <span>Hasil Prediksi</span>
        </a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
        {% block content %}
        {% endblock %}
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("collapsed");
        }
    </script>

</body>

</html>
